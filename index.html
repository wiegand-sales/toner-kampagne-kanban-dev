<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toner-Kampagne · Kanban (DEV)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-dark:#3C3489;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#085041;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-dark:#633806;
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-dark:#2C2C2A;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-dark:#173404;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-dark:#501313;
  --r-sm:6px;--r-md:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;}

.staging-topbar{background:#BA7517;color:#fff;font-size:12px;font-weight:600;text-align:center;padding:6px 10px;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;}
.staging-topbar a{color:#fff;text-decoration:underline;font-weight:700;}
.staging-bottombar{background:#BA7517;color:#fff;font-size:12px;font-weight:600;text-align:center;padding:6px 10px;flex-shrink:0;}
.staging-bottombar a{color:#fff;text-decoration:underline;font-weight:700;}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:10px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-dot{width:9px;height:9px;border-radius:50%;background:var(--purple);}
.tb-title{font-size:16px;font-weight:700;}
.tb-sub{font-size:12px;color:var(--text2);}
.tb-stats{display:flex;gap:18px;margin-left:14px;}
.tb-stat{text-align:center;}
.tb-stat-val{font-size:16px;font-weight:700;}
.tb-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.tb-right{display:flex;align-items:center;gap:8px;}
input[type=text],input[type=date],input[type=tel],input[type=email],input[type=number],input[type=file],select,textarea{
  font-size:13px;padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--border2);
  background:var(--bg2);color:var(--text);font-family:inherit;outline:none;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--purple);}
textarea{resize:vertical;min-height:70px;line-height:1.5;width:100%;}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px;}
.search-box{position:relative;}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;}
.search-box input{padding-left:30px;width:190px;}
.btn{padding:8px 14px;font-size:13px;font-weight:500;border-radius:var(--r-md);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);display:flex;align-items:center;gap:6px;transition:all .12s;font-family:inherit;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-primary:hover{background:var(--purple-dark);}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:transparent;}
.btn-sm{padding:5px 10px;font-size:12px;}
.me-select{font-size:12px;padding:6px 9px;}

/* FILTER BAR */
.filterbar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 22px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg);transition:all .12s;}
.chip:hover{border-color:var(--purple);color:var(--text);}
.chip.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.filterbar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-right:2px;}

/* BOARD */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 22px;}
.board{display:flex;gap:12px;height:100%;min-width:max-content;}
.col{width:230px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);border-radius:var(--r-lg);height:100%;}
.col.drop-hover{outline:2px dashed var(--purple);outline-offset:-2px;}
.col-hdr{padding:11px 12px 9px;display:flex;align-items:center;gap:7px;flex-shrink:0;cursor:grab;}
.col-hdr.col-dragging{opacity:.4;}
.col.col-drop-hover{outline:2px dashed var(--purple);outline-offset:-2px;}
.col-menu-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:4px;flex-shrink:0;}
.col-menu-btn:hover{background:var(--bg);color:var(--text);}
.col-hdr-wrap{position:relative;}
.col-menu-popover{position:absolute;top:100%;right:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 6px 20px rgba(0,0,0,.14);padding:8px;z-index:150;min-width:190px;}
.col-menu-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text);}
.col-menu-item:hover{background:var(--bg2);}
.col-menu-item.danger{color:var(--red);}
.col-color-row{display:flex;gap:6px;padding:6px 8px;flex-wrap:wrap;}
.col-color-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.col-color-dot.selected{border-color:var(--text);}
.col-name-input{font-size:12px;font-weight:600;border:1px solid var(--purple);border-radius:4px;padding:2px 6px;width:100%;background:var(--bg);font-family:inherit;}
.col-add-tile{width:230px;flex-shrink:0;height:fit-content;}
.col-add-btn{width:100%;background:rgba(0,0,0,.03);border:1px dashed var(--border2);border-radius:var(--r-lg);padding:12px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center;font-family:inherit;}
.col-add-btn:hover{background:rgba(0,0,0,.06);color:var(--text);}
.col-add-form{background:var(--bg2);border-radius:var(--r-lg);padding:10px;}
.col-add-form input{width:100%;margin-bottom:8px;}
.col-add-form-actions{display:flex;gap:6px;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.col-count{font-size:11px;font-weight:600;color:var(--text3);background:var(--bg);border-radius:20px;padding:1px 7px;}
.col-body{flex:1;overflow-y:auto;padding:2px 8px 8px;}
.col-body::-webkit-scrollbar{width:4px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.col-empty{font-size:11px;color:var(--text3);text-align:center;padding:14px 4px;}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 11px;margin-bottom:8px;cursor:grab;transition:box-shadow .12s,border-color .12s;}
.card:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card.dragging{opacity:.4;}
.card-labels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.label-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;color:#fff;}
.card-company{font-size:13px;font-weight:600;margin-bottom:2px;}
.card-contact{font-size:12px;color:var(--text2);margin-bottom:8px;}
.card-badges-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.mini-badge{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px;}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.member-stack{display:flex;}
.member-av{width:19px;height:19px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--bg);margin-left:-6px;}
.member-av:first-child{margin-left:0;}
.due-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.due-ok{background:var(--gray-bg);color:var(--gray-dark);}
.due-soon{background:var(--amber-bg);color:var(--amber-dark);}
.due-overdue{background:var(--red-bg);color:var(--red-dark);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,18,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-lg{background:var(--bg);border-radius:var(--r-lg);width:100%;max-width:1360px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-topline{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title-input{font-size:17px;font-weight:700;border:none;background:transparent;flex:1;padding:4px 0;font-family:inherit;color:var(--text);}
.modal-title-input:focus{outline:none;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;background:none;border:none;flex-shrink:0;margin-left:10px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
.modal-left{padding:18px 20px;overflow-y:auto;background:var(--bg3);}
.modal-right{background:var(--bg2);border-left:1px solid var(--border);padding:16px 18px;display:flex;flex-direction:column;overflow:hidden;}
.field-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.field{margin-bottom:10px;}
.section-block{margin-top:18px;}
.info-section{border:1px solid var(--border2);border-radius:10px;padding:15px 16px;margin-bottom:14px;background:var(--bg);box-shadow:0 1px 2px rgba(0,0,0,.03);}
.info-section:last-child{margin-bottom:0;}
.info-section .section-hdr{margin-top:0;}
.info-section input[type=text],.info-section input[type=date],.info-section input[type=tel],.info-section input[type=email],.info-section input[type=number],.info-section select,.info-section textarea{background:var(--bg3);}
.section-hdr{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pill-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px dashed var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;}
.pill-btn:hover{border-color:var(--purple);color:var(--text);}
.label-row-editor,.member-row-editor{display:flex;flex-wrap:wrap;gap:6px;align-items:center;position:relative;}
.member-chip{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 9px 3px 3px;font-size:12px;}
.checklist-progress-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.checklist-progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .15s;}
.check-item-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.check-item-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;}
.check-item-text{font-size:13px;flex:1;}
.check-item-text.done{text-decoration:line-through;color:var(--text3);}
.check-item-del{cursor:pointer;color:var(--text3);font-size:14px;background:none;border:none;flex-shrink:0;}
.check-item-del:hover{color:var(--red);}
.add-check-row{display:flex;gap:6px;margin-top:6px;}
.add-check-row input{flex:1;}
.popover{position:absolute;top:100%;left:0;margin-top:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 6px 20px rgba(0,0,0,.14);padding:10px;z-index:200;min-width:220px;}
.popover-item{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:6px;cursor:pointer;font-size:13px;}
.popover-item:hover{background:var(--bg2);}
.popover-item input[type=checkbox]{accent-color:var(--purple);}
.popover-divider{height:1px;background:var(--border);margin:8px 0;}
.color-swatch-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap;}
.color-swatch{width:18px;height:18px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.color-swatch.selected{border-color:var(--text);}
.color-swatch.disabled{cursor:not-allowed;opacity:.25;}
.small-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;}
.activity-feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-top:12px;padding-right:2px;}
.activity-feed::-webkit-scrollbar{width:4px;}
.activity-feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.comment-item{display:flex;gap:8px;}
.comment-av{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.comment-bubble{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 10px;flex:1;min-width:0;}
.comment-author{font-size:12px;font-weight:600;}
.comment-date{font-size:10px;color:var(--text3);margin-left:6px;font-weight:400;}
.comment-text{font-size:13px;margin-top:2px;word-wrap:break-word;}
.activity-item{font-size:11px;color:var(--text3);padding-left:34px;font-style:italic;}
.comment-input-row{display:flex;gap:6px;flex-shrink:0;}
.comment-input-row textarea{min-height:44px;flex:1;}
.modal-actions{display:flex;justify-content:space-between;gap:8px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.right-hdr{font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;display:flex;align-items:center;gap:6px;}
.tab-bar{display:flex;gap:3px;background:var(--bg3);border-radius:9px;padding:4px;flex-shrink:0;margin-bottom:14px;}
.tab-btn{flex:1;background:transparent;border:none;border-radius:6px;font-size:12px;font-weight:600;color:var(--text2);padding:9px 8px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-btn.active{background:var(--bg);color:var(--purple);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.printer-card{border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;background:var(--bg2);}
.printer-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sku-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sku-grid label{font-size:10px;margin-bottom:2px;}
.file-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;margin-bottom:6px;}
.file-row a{color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

@media (max-width:720px){
  .tb-stats{display:none;}
  .col{width:210px;}
  .modal-grid{grid-template-columns:1fr;}
  .modal-right{border-left:none;border-top:1px solid var(--border);}
}
</style>
</head>
<body>
<div class="staging-topbar"><i class="ti ti-alert-triangle"></i> STAGING – Diese Version ist nicht live &nbsp;·&nbsp; <a href="https://wiegand-sales.github.io/toner-kampagne-kanban/" target="_blank">&rarr; Live ansehen</a></div>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-dot"></div>
    <div>
      <div class="tb-title">Toner-Kampagne</div>
      <div class="tb-sub">Kostenloser Toner → Follow-up → Angebot</div>
    </div>
    <div class="tb-stats" id="statsBar"></div>
  </div>
  <div class="tb-right">
    <label style="margin:0;white-space:nowrap">Ich bin:</label>
    <select id="currentUserSelect" class="me-select" onchange="currentUser=this.value"></select>
    <div class="search-box"><i class="ti ti-search"></i><input type="text" id="searchInput" placeholder="Firma, Kontakt, Kd-Nr." oninput="renderBoard()"></div>
    <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
    <button class="btn btn-primary" onclick="openLeadModal(null)"><i class="ti ti-plus"></i> Neuer Lead</button>
  </div>
</div>

<div class="filterbar">
  <span class="filterbar-label">Agent</span>
  <div id="agentChips"></div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="modal-overlay hidden" id="leadModal">
  <div class="modal-lg" id="leadModalInner"></div>
</div>

<script>
// ── CONFIG ──
const AGENTS=[
  {id:'a1',name:'Sabine Krause',color:'purple'},
  {id:'a2',name:'Jonas Weber',color:'teal'},
  {id:'a3',name:'Lea Hoffmann',color:'amber'},
];
let COLUMNS=[
  {id:'new',name:'Neue Leads',color:'gray'},
  {id:'qualified',name:'Qualifiziert',color:'gray'},
  {id:'contact',name:'Erstkontakt läuft',color:'teal'},
  {id:'toner_confirmed',name:'Toner zugesagt',color:'teal'},
  {id:'toner_shipped',name:'Toner unterwegs',color:'teal'},
  {id:'followup',name:'Follow-up fällig',color:'amber'},
  {id:'offer_build',name:'Angebot bauen',color:'amber'},
  {id:'offer_sent',name:'Angebot raus',color:'amber'},
  {id:'won',name:'Gewonnen',color:'green'},
  {id:'lost',name:'Verloren',color:'red'},
];
const COLOR_HEX={purple:'var(--purple)',teal:'var(--teal)',amber:'var(--amber)',gray:'var(--gray)',green:'var(--green)',red:'var(--red)'};
const COLOR_BG={purple:'var(--purple-bg)',teal:'var(--teal-bg)',amber:'var(--amber-bg)',gray:'var(--gray-bg)',green:'var(--green-bg)',red:'var(--red-bg)'};
const COLOR_TEXT={purple:'var(--purple-dark)',teal:'var(--teal-dark)',amber:'var(--amber-dark)',gray:'var(--gray-dark)',green:'var(--green-dark)',red:'var(--red-dark)'};
const LABEL_PALETTE=['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517','#E24B4A','#5F5E5A'];
const TODAY='2026-07-02';

// ── STATE (in-memory, kein Backend – Vorstufe fuer Supabase) ──
let LABELS=[
  {id:'l1',name:'Heiß',color:'#D85A30'},
  {id:'l2',name:'Kalt',color:'#378ADD'},
  {id:'l3',name:'VIP',color:'#534AB7'},
  {id:'l4',name:'Reklamation',color:'#E24B4A'},
];
let currentUser='a1';
let nextColId=1;

// ── PERSISTENZ (localStorage – Zwischenlösung bis Supabase angebunden ist) ──
const STORAGE_KEY='toner_kanban_state_v1';
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      leads, COLUMNS, LABELS, nextId, nextLabelId, nextPrinterId, nextColId
    }));
  }catch(e){ console.warn('Speichern fehlgeschlagen:', e); }
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(data.leads)leads=data.leads;
    if(data.COLUMNS)COLUMNS=data.COLUMNS;
    if(data.LABELS)LABELS=data.LABELS;
    if(data.nextId)nextId=data.nextId;
    if(data.nextLabelId)nextLabelId=data.nextLabelId;
    if(data.nextPrinterId)nextPrinterId=data.nextPrinterId;
    if(data.nextColId)nextColId=data.nextColId;
    return true;
  }catch(e){ console.warn('Laden fehlgeschlagen:', e); return false; }
}

function nowISO(){return new Date().toISOString();}
function fmtDateTime(iso){
  const d=new Date(iso);
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}, ${p(d.getHours())}:${p(d.getMinutes())}`;
}

      model: first ? first.model : '',

function fmtDate(d){if(!d)return'';const p=d.split('-');return`${p[2]}.${p[1]}.${p[0]}`;}
function daysUntil(d){if(!d)return null;const diff=(new Date(d)-new Date(TODAY))/86400000;return Math.round(diff);}

function formatBytes(b){if(b<1024)return b+' B';if(b<1024*1024)return(b/1024).toFixed(1)+' KB';return(b/1024/1024).toFixed(1)+' MB';}

function getFilteredLeads(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  return leads.filter(l=>{
    if(activeAgentFilter!=='all'&&!l.members.includes(activeAgentFilter))return false;
    if(q&&!(l.company.toLowerCase().includes(q)||l.contact.toLowerCase().includes(q)||(l.customerNumber||'').toLowerCase().includes(q)))return false;
    return true;
  });
}

// ── RENDER: STATS ──
function renderStats(){
  const fl=getFilteredLeads();
  const total=fl.length;
  const won=fl.filter(l=>l.status==='won').length;
  const overdue=fl.filter(l=>l.followup&&daysUntil(l.followup)<0).length;
  const rate=total?Math.round(won/total*100):0;
  const forecastSum=fl.reduce((s,l)=>s+(parseFloat(l.forecast)||0),0);
  document.getElementById('statsBar').innerHTML=`
    <div class="tb-stat"><div class="tb-stat-val">${total}</div><div class="tb-stat-label">Leads</div></div>
    <div class="tb-stat"><div class="tb-stat-val" style="color:${overdue>0?'var(--red)':'var(--text)'}">${overdue}</div><div class="tb-stat-label">Follow-up überfällig</div></div>
    <div class="tb-stat"><div class="tb-stat-val" style="color:var(--green)">${rate}%</div><div class="tb-stat-label">Gewonnen</div></div>
    <div class="tb-stat"><div class="tb-stat-val" style="color:var(--purple)">${fmtEur(forecastSum)}</div><div class="tb-stat-label">Forecast gesamt</div></div>`;
}

    : `<div class="col-add-tile"><button class="col-add-btn" onclick="openAddColumnForm()"><i class="ti ti-plus"></i> Liste hinzufügen</button></div>`;

function cardHtml(l){
  const labelsHtml=(l.labelIds||[]).map(id=>{const lb=labelById(id);return lb?`<span class="label-chip" style="background:${lb.color}">${lb.name}</span>`:'';}).join('');
  const membersHtml=(l.members||[]).slice(0,4).map(id=>{const a=agentById(id);return a?`<div class="member-av" style="background:${COLOR_BG[a.color]};color:${COLOR_TEXT[a.color]}" title="${a.name}">${ini(a.name)}</div>`:'';}).join('');
  const checkTotal=(l.checklist||[]).length;
  const checkDone=(l.checklist||[]).filter(c=>c.done).length;
  let dueHtml='';
  if(l.followup){
    const d=daysUntil(l.followup);
    const cls=d<0?'due-overdue':(d<=2?'due-soon':'due-ok');
    const dlabel=d<0?`${Math.abs(d)}T überfällig`:(d===0?'heute':fmtDate(l.followup));
    dueHtml=`<span class="due-badge ${cls}"><i class="ti ti-clock" style="font-size:11px"></i>${dlabel}</span>`;
  }
  const metaBadges=[];
  if(l.art)metaBadges.push(`<span class="mini-badge"><i class="ti ti-building-store" style="font-size:12px"></i>${l.art}</span>`);
  if(checkTotal)metaBadges.push(`<span class="mini-badge"><i class="ti ti-checklist" style="font-size:12px"></i>${checkDone}/${checkTotal}</span>`);
  if(l.forecast)metaBadges.push(`<span class="mini-badge" style="color:var(--green-dark);font-weight:600"><i class="ti ti-currency-euro" style="font-size:12px"></i>${fmtEur(l.forecast)}</span>`);
  return `<div class="card" draggable="true" data-id="${l.id}" ondragstart="onDragStart(event,${l.id})" ondragend="onDragEnd(event)" onclick="openLeadModal(${l.id})">
    ${labelsHtml?`<div class="card-labels">${labelsHtml}</div>`:''}
    <div class="card-company">${l.company}</div>
    <div class="card-contact">${l.contact}${l.customerNumber?` · ${l.customerNumber}`:''}</div>
    ${metaBadges.length?`<div class="card-badges-row">${metaBadges.join('')}</div>`:''}
    <div class="card-foot">
      <div class="member-stack">${membersHtml}</div>
      ${dueHtml}
    </div>
  </div>`;
}

// ── DRAG & DROP ──
function onDragStart(e,id){dragCardId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDragEnd(e){e.target.classList.remove('dragging');}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drop-hover');}
function onDragLeave(e){e.currentTarget.classList.remove('drop-hover');}
function onDrop(e,colId){
  e.preventDefault();e.currentTarget.classList.remove('drop-hover');
  const l=leads.find(x=>x.id===dragCardId);
  if(l&&l.status!==colId){
    const oldName=colById(l.status).name,newName=colById(colId).name;
    l.status=colId;
    l.activity.unshift({id:Date.now(),type:'activity',author:currentUser,text:`Status geändert: ${oldName} → ${newName}`,date:nowISO()});
    saveState();
    renderBoard();
  }
  dragCardId=null;
}

function toggleColMenu(id){

  renderBoard();
}
function startRenameColumn(id){
  colMenuOpenId=null;
  editingColId=id;
  renderBoard();
  const el=document.getElementById('colNameInput_'+id);
  if(el){el.focus();el.select();}
}
function confirmRenameColumn(id){
  const el=document.getElementById('colNameInput_'+id);
  if(el){
    const val=el.value.trim();
    const col=COLUMNS.find(c=>c.id===id);
    if(col && val) col.name=val;
  }
  editingColId=null;
  saveState();
  renderBoard();
}
function setColumnColor(id,color){
  const col=COLUMNS.find(c=>c.id===id);
  if(col)col.color=color;
  colMenuOpenId=null;
  saveState();
  renderBoard();
}
function deleteColumn(id){
  if(COLUMNS.length<=1){
    alert('Die letzte verbleibende Liste kann nicht gelöscht werden.');
    return;
  }
  const col=COLUMNS.find(c=>c.id===id);
  const leadsInCol=leads.filter(l=>l.status===id);
  const otherCol=COLUMNS.find(c=>c.id!==id);
  const msg=leadsInCol.length
    ? `Die Liste "${col.name}" enthält ${leadsInCol.length} Lead(s). Diese werden nach "${otherCol.name}" verschoben. Liste trotzdem löschen?`
    : `Liste "${col.name}" wirklich löschen?`;
  if(!confirm(msg))return;
  leadsInCol.forEach(l=>{
    l.status=otherCol.id;
    l.activity.unshift({id:Date.now()+Math.random(),type:'activity',author:currentUser,text:`Status geändert: ${col.name} → ${otherCol.name} (Liste gelöscht)`,date:nowISO()});
  });
  COLUMNS=COLUMNS.filter(c=>c.id!==id);
  colMenuOpenId=null;
  saveState();
  renderBoard();
}
function openAddColumnForm(){
  addColumnFormOpen=true;
  renderBoard();
  const el=document.getElementById('newColumnNameInput');
  if(el)el.focus();
}
function cancelAddColumn(){
  addColumnFormOpen=false;
  renderBoard();
}
function confirmAddColumn(){
  const el=document.getElementById('newColumnNameInput');
  const name=el?el.value.trim():'';
  if(!name){cancelAddColumn();return;}
  const palette=['gray','teal','amber','purple','green','red'];
  const color=palette[COLUMNS.length%palette.length];
  COLUMNS.push({id:'col_'+(nextColId++)+'_'+Date.now(),name,color});
  addColumnFormOpen=false;
  saveState();
  renderBoard();
}

// Spalten-Reihenfolge per Drag & Drop
function onColDragStart(e,id){
  dragColId=id;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('col-dragging');
}
function onColDragOver(e){
  if(!dragColId)return;
  e.preventDefault();
  e.stopPropagation();
  const col=e.currentTarget.closest('.col');
  if(col)col.classList.add('col-drop-hover');
}
function onColDrop(e,targetId){
  if(!dragColId)return;
  e.preventDefault();
  e.stopPropagation();
  const col=e.currentTarget.closest('.col');
  if(col)col.classList.remove('col-drop-hover');
  if(dragColId!==targetId){
    const fromIdx=COLUMNS.findIndex(c=>c.id===dragColId);
    const toIdx=COLUMNS.findIndex(c=>c.id===targetId);
    if(fromIdx>-1&&toIdx>-1){
      const [moved]=COLUMNS.splice(fromIdx,1);
      COLUMNS.splice(toIdx,0,moved);
      saveState();
    }
  }
  dragColId=null;
  renderBoard();
}
function onColDragEnd(e){
  e.currentTarget.classList.remove('col-dragging');
  document.querySelectorAll('.col-drop-hover').forEach(el=>el.classList.remove('col-drop-hover'));
  dragColId=null;
}

// Versand-Drucker (links, EIN Drucker, mit Einkaufspreis je SKU)
function updateShipPrinterModel(val){draftLead.shipPrinter.model=val;}
function updateShipPrinterSku(idx,field,val){draftLead.shipPrinter.skus[idx][field]=val;}

// Kundenbedarf-Drucker (Forecast-Tab, mehrere Drucker, mit benötigter Anzahl je SKU)
function addDemandPrinter(){
  draftLead.demandPrinters.push({id:nextPrinterId++,model:'',skus:[{sku:'',qty:'',price:''},{sku:'',qty:'',price:''},{sku:'',qty:'',price:''},{sku:'',qty:'',price:''}]});
  renderLeadModal();
}
function removeDemandPrinter(id){
  draftLead.demandPrinters=draftLead.demandPrinters.filter(p=>p.id!==id);
  recomputeForecast();
  renderLeadModal();
}
function updateDemandPrinterModel(id,val){
  const p=draftLead.demandPrinters.find(x=>x.id===id);
  if(p)p.model=val;
}
function updateDemandPrinterSku(id,idx,field,val){
  const p=draftLead.demandPrinters.find(x=>x.id===id);
  if(p)p.skus[idx][field]=val;
  recomputeForecast();
}
function recomputeForecast(){
  const total=draftLead.demandPrinters.reduce((sum,p)=>sum+p.skus.reduce((s,x)=>s+(parseFloat(x.price)||0)*(parseFloat(x.qty)||0),0),0);
  draftLead.forecast=total;
  const el=document.getElementById('forecastComputedValue');
  if(el)el.textContent=fmtEur(total)||'0 €';
  const statEl=document.getElementById('statsBar');
  if(statEl)renderStats();
}

// Rechte Spalte: Tabs
function setRightTab(tab){rightTab=tab;renderLeadModal();}

// Dateien
function handleFileUpload(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;
  let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=()=>{
      draftLead.files.push({id:Date.now()+Math.random(),name:file.name,size:file.size,dataUrl:reader.result});
      pending--;
      if(pending===0)renderLeadModal();
    };
    reader.readAsDataURL(file);
  });
}
function removeFile(id){
  draftLead.files=draftLead.files.filter(f=>f.id!==id);
  renderLeadModal();
}

// Checkliste
function deleteChecklist(){
  draftLead.checklist=[];
  renderLeadModal();
}

// Labels
function toggleLabelPopover(){labelPopoverOpen=!labelPopoverOpen;memberPopoverOpen=false;renderLeadModal();}
function toggleDraftLabel(id){
  const i=draftLead.labelIds.indexOf(id);
  if(i>-1)draftLead.labelIds.splice(i,1);else draftLead.labelIds.push(id);
  renderLeadModal();
}
function selectLabelColor(el){
  document.querySelectorAll('#newLabelColors .color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}
function startEditLabel(id){
  editingLabelId=id;
  renderLeadModal();
  const el=document.getElementById('editLabelInput_'+id);
  if(el){el.focus();el.select();}
}
function confirmEditLabel(id){
  const el=document.getElementById('editLabelInput_'+id);
  if(el){
    const val=el.value.trim();
    const lb=labelById(id);
    if(lb&&val)lb.name=val;
  }
  editingLabelId=null;
  saveState();
  renderLeadModal();
}
function deleteLabelGlobal(id){
  const lb=labelById(id);
  if(!confirm(`Label "${lb?lb.name:''}" wirklich löschen? Es wird von allen Leads entfernt.`))return;
  LABELS=LABELS.filter(l=>l.id!==id);
  leads.forEach(l=>{ l.labelIds=l.labelIds.filter(x=>x!==id); });
  if(draftLead)draftLead.labelIds=draftLead.labelIds.filter(x=>x!==id);
  saveState();
  renderLeadModal();
}
function createLabel(){
  const name=document.getElementById('newLabelName').value.trim();
  if(!name)return;
  const sel=document.querySelector('#newLabelColors .color-swatch.selected');
  const color=sel?sel.dataset.color:LABEL_PALETTE[0];
  const newLabel={id:'l'+(nextLabelId++),name,color};
  LABELS.push(newLabel);
  draftLead.labelIds.push(newLabel.id);
  saveState();
  renderLeadModal();
}

// Members
function toggleMemberPopover(){memberPopoverOpen=!memberPopoverOpen;labelPopoverOpen=false;renderLeadModal();}
function toggleDraftMember(id){
  const i=draftLead.members.indexOf(id);
  if(i>-1)draftLead.members.splice(i,1);else draftLead.members.push(id);
  renderLeadModal();
}

// Checklist
function addChecklistItem(){
  const inp=document.getElementById('newCheckItemInput');
  const text=inp.value.trim();
  if(!text)return;
  draftLead.checklist.push({id:Date.now(),text,done:false});
  renderLeadModal();
}
function toggleCheckItem(id){
  const item=draftLead.checklist.find(c=>c.id===id);
  if(item)item.done=!item.done;
  renderLeadModal();
}
function deleteCheckItem(id){
  draftLead.checklist=draftLead.checklist.filter(c=>c.id!==id);
  renderLeadModal();
}

// Comments
function addComment(){
  const inp=document.getElementById('commentInput');
  const text=inp.value.trim();
  if(!text)return;
  draftLead.activity.unshift({id:Date.now(),type:'comment',author:currentUser,text,date:nowISO()});
  renderLeadModal();
}

// Save / Delete
function saveLead(){
  if(!draftLead.company.trim()){document.getElementById('fCompany').focus();return;}
  if(editingLeadId){
    const original=leads.find(x=>x.id===editingLeadId);
    if(original.status!==draftLead.status){
      draftLead.activity.unshift({id:Date.now()+1,type:'activity',author:currentUser,text:`Status geändert: ${colById(original.status).name} → ${colById(draftLead.status).name}`,date:nowISO()});
    }
    Object.assign(original,draftLead);
  }else{
    draftLead.id=nextId++;
    draftLead.activity.unshift({id:Date.now(),type:'activity',author:currentUser,text:'Lead erstellt',date:nowISO()});
    leads.push(draftLead);
  }
  saveState();
  closeModal('leadModal');renderBoard();
}
function deleteLead(){
  const l=leads.find(x=>x.id===editingLeadId);
  if(!confirm(`Lead "${l?l.company:''}" wirklich unwiderruflich löschen?`))return;
  leads=leads.filter(x=>x.id!==editingLeadId);
  saveState();
  closeModal('leadModal');renderBoard();
}

// ── CSV EXPORT ──
function exportCSV(){
  const headers=['Firmenname','Kundennummer','Art','Adresse','Anzahl Bestellungen','Umsatz (EUR)','Versand-Drucker','Versand-SKUs (Preis)','Investition gesamt (EUR)','Kundenbedarf Drucker & Anzahl','Ansprechpartner','Telefonnummer','E-Mail','Mitglieder','Status','Free Toner verschickt','Datum Erstkontakt','Follow-up-Datum','Forecast (EUR)','Labels','Notizen'];
  const rows=leads.map(l=>{
    const shipSkus=l.shipPrinter.skus.filter(s=>s.sku).map(s=>`${s.sku}${s.price?` (${fmtEur(s.price)})`:''}`).join(', ');
    const investTotal=l.shipPrinter.skus.reduce((s,x)=>s+(parseFloat(x.price)||0),0);
    const demand=(l.demandPrinters||[]).map(p=>`${p.model} [${p.skus.filter(s=>s.sku).map(s=>`${s.sku}${s.qty?` x${s.qty}`:''}`).join(', ')}]`).join(' | ');
    return [
      l.company,l.customerNumber,l.art,l.address,l.orderCount,l.revenue,
      l.shipPrinter.model,shipSkus,investTotal||'',demand,
      l.contact,l.phone,l.email,
      l.members.map(id=>agentById(id)?.name).filter(Boolean).join('; '),
      colById(l.status).name,l.tonerSent,l.firstContact,l.followup,l.forecast,
      l.labelIds.map(id=>labelById(id)?.name).filter(Boolean).join('; '),
      l.notes
    ];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='toner_kampagne_leads.csv';a.click();
  URL.revokeObjectURL(url);
}
